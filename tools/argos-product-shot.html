<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Argos Product Shot</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef6ef;
      --panel: rgba(255, 255, 255, 0.74);
      --edge: rgba(9, 176, 44, 0.12);
      --text: #102218;
      --muted: rgba(16, 34, 24, 0.66);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 38%, rgba(255,255,255,0.94), rgba(255,255,255,0.3) 28%, transparent 52%),
        radial-gradient(circle at 50% 70%, rgba(9,176,44,0.12), transparent 44%),
        linear-gradient(180deg, #f7fff8 0%, #edf6ef 100%);
      color: var(--text);
    }

    body.is-transparent {
      background: transparent !important;
    }

    .frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    body.is-transparent .frame::before,
    body.is-transparent .frame::after,
    body.is-transparent .plate,
    body.is-transparent .caption {
      display: none !important;
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .frame::before {
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.88), transparent 26%),
        radial-gradient(circle at 78% 22%, rgba(255,255,255,0.64), transparent 24%),
        radial-gradient(circle at 50% 88%, rgba(9,176,44,0.12), transparent 32%);
      filter: blur(24px);
    }

    .frame::after {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0) 28%),
        linear-gradient(0deg, rgba(16,34,24,0.04), rgba(16,34,24,0) 18%);
    }

    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
      background: transparent;
    }

    body.is-transparent model-viewer {
      filter: contrast(1.14) brightness(0.92) saturate(0.92);
    }

    .plate {
      position: absolute;
      left: 50%;
      bottom: 8.5%;
      width: min(58vw, 920px);
      aspect-ratio: 2.9 / 1;
      transform: translateX(-50%);
      border-radius: 999px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.92), rgba(255,255,255,0.46) 48%, rgba(255,255,255,0) 74%);
      filter: blur(5px);
      opacity: 0.9;
      pointer-events: none;
    }

    .caption {
      position: absolute;
      left: 50%;
      top: 40px;
      transform: translateX(-50%);
      display: grid;
      gap: 8px;
      justify-items: center;
      padding: 16px 22px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--edge);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(16, 34, 24, 0.08);
    }

    .eyebrow {
      margin: 0;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #0b8f27;
    }

    .title {
      margin: 0;
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.05em;
      font-weight: 900;
    }

    .subtitle {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
      text-align: center;
      max-width: 42ch;
    }

    .caption.is-hidden {
      display: none;
    }
  </style>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  <div class="frame">
    <div class="plate"></div>
    <div class="caption" id="caption">
      <p class="eyebrow" id="eyebrow">Guardian</p>
      <h1 class="title" id="title">Argos</h1>
      <p class="subtitle" id="subtitle">A calm, product-style studio render from the production model.</p>
    </div>
    <model-viewer
      id="viewer"
      src="/public/models/Assembly/Argos_asm_render.glb"
      alt="Guardian Argos robot"
      camera-controls
      interaction-prompt="none"
      disable-pan
      disable-zoom
      environment-image="neutral"
      exposure="1.2"
      shadow-intensity="1"
      shadow-softness="0.85"
      tone-mapping="commerce"
      camera-orbit="35deg 78deg 125%"
      field-of-view="24deg"
      min-camera-orbit="auto auto 80%"
      max-camera-orbit="auto auto 180%">
    </model-viewer>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const viewer = document.getElementById("viewer");
    const caption = document.getElementById("caption");
    const eyebrow = document.getElementById("eyebrow");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");

    const setIf = (name, setter) => {
      const value = params.get(name);
      if (value != null && value !== "") setter(value);
    };

    const viewPresets = {
      hero: {
        orbit: "35deg 78deg 150%",
        fov: "24deg",
        exposure: "1.2"
      },
      front: {
        orbit: "90deg 80deg 116%",
        fov: "18deg",
        exposure: "0.96"
      },
      top: {
        orbit: "45deg 18deg 145%",
        fov: "24deg",
        exposure: "1.08"
      },
      rear: {
        orbit: "215deg 78deg 150%",
        fov: "24deg",
        exposure: "1.15"
      }
    };

    const view = (params.get("view") || "").toLowerCase();
    const viewPreset = viewPresets[view];
    if (viewPreset) {
      viewer.setAttribute("camera-orbit", viewPreset.orbit);
      viewer.setAttribute("field-of-view", viewPreset.fov);
      viewer.setAttribute("exposure", viewPreset.exposure);
    }

    setIf("orbit", (value) => viewer.setAttribute("camera-orbit", value));
    setIf("src", (value) => viewer.setAttribute("src", value));
    setIf("fov", (value) => viewer.setAttribute("field-of-view", value));
    setIf("exposure", (value) => viewer.setAttribute("exposure", value));
    setIf("shadow", (value) => viewer.setAttribute("shadow-intensity", value));
    setIf("poster", (value) => viewer.setAttribute("poster", value));
    setIf("eyebrow", (value) => { eyebrow.textContent = value; });
    setIf("title", (value) => { title.textContent = value; });
    setIf("subtitle", (value) => { subtitle.textContent = value; });
    setIf("caption", (value) => {
      if (value === "0" || value.toLowerCase() === "false") {
        caption.classList.add("is-hidden");
      }
    });

    const bg = params.get("bg");
    if (bg) {
      document.body.style.background = decodeURIComponent(bg);
    }

    const transparent = params.get("transparent");
    if (transparent && transparent !== "0" && transparent.toLowerCase() !== "false") {
      document.body.classList.add("is-transparent");
    }

    const plate = document.querySelector(".plate");
    setIf("plate", (value) => {
      if (value === "0" || value.toLowerCase() === "false") {
        plate.style.display = "none";
      }
    });

    const finishPresets = {
      matte: {
        baseColor: [0.82, 0.85, 0.91, 1],
        metallic: 0,
        roughness: 0.82
      },
      chrome: {
        baseColor: [0.9, 0.88, 0.74, 1],
        metallic: 1,
        roughness: 0.2
      },
      steel: {
        baseColor: [0.82, 0.84, 0.88, 1],
        metallic: 0.92,
        roughness: 0.34
      }
    };

    viewer.addEventListener("load", () => {
      const finish = (params.get("finish") || "").toLowerCase();
      const preset = finishPresets[finish];
      if (!preset || !viewer.model || !Array.isArray(viewer.model.materials)) return;

      for (const material of viewer.model.materials) {
        const pbr = material.pbrMetallicRoughness;
        if (!pbr) continue;
        pbr.setBaseColorFactor(preset.baseColor);
        pbr.setMetallicFactor(preset.metallic);
        pbr.setRoughnessFactor(preset.roughness);
      }
    });
  </script>
</body>
</html>
